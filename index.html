<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unifatecie EAD – Polos Barra do Mendes e Ipupiara</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #111111;
      background: #f4f4f5;
    }
    :root {
      --primary:  #f97316;
      --accent:   #25D366;
      --light:    #f4f4f5;
      --dark:     #111111;
      --white:    #ffffff;
      --gray:     #6b7280;
      --radius:   12px;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #111111 45%, #18181b 100%);
      color: var(--white);
      text-align: center;
      padding: 60px 20px 80px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 350px; height: 350px;
      background: rgba(249,115,22,0.15);
      border-radius: 50%;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -60px;
      width: 250px; height: 250px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .logo-img {
      max-height: 80px;
      width: auto;
      margin: 0 auto 16px;
      display: block;
      position: relative; z-index: 1;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 16px;
      position: relative; z-index: 1;
    }
    header p {
      font-size: 1.1rem;
      opacity: .9;
      max-width: 700px;
      margin: 0 auto 32px;
      position: relative; z-index: 1;
    }
    .btn-hero {
      display: inline-block;
      background: var(--primary);
      color: #111111;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      position: relative; z-index: 1;
      transition: transform .2s, background .2s;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
    }
    .btn-hero:hover { transform: translateY(-3px); background: #ea580c; }

    /* ===== WAVE ===== */
    .wave { display: block; width: 100%; background: #111111; margin-bottom: -2px; }

    /* ===== GENÉRICO ===== */
    section { padding: 64px 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .section-title {
      text-align: center;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
    }
    .section-sub {
      text-align: center;
      color: var(--gray);
      font-size: 1rem;
      margin-bottom: 32px;
    }
    .divider {
      width: 60px; height: 4px;
      background: var(--primary);
      border-radius: 4px;
      margin: 10px auto 48px;
    }

    /* ===== DIFERENCIAIS ===== */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 28px;
    }
    .feature-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
      border: 1px solid #e5e7eb;
      transition: transform .2s, box-shadow .2s;
    }
    .feature-card:hover { transform: translateY(-6px); box-shadow: 0 6px 22px rgba(0,0,0,.12); }
    .feature-icon { font-size: 2.4rem; margin-bottom: 16px; }
    .feature-card h3 { font-size: 1.05rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .feature-card p { color: var(--gray); font-size: .95rem; line-height: 1.5; }

    /* ===== POLOS ===== */
    #polos { background: var(--white); }
    .polos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }
    .polo-card {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      border: 1px solid #e5e7eb;
      transition: transform .2s, box-shadow .2s;
      background: var(--white);
    }
    .polo-card:hover { transform: translateY(-6px); box-shadow: 0 8px 28px rgba(0,0,0,.12); }
    .polo-header {
      background: linear-gradient(135deg, #111111, #27272a);
      color: var(--white);
      padding: 28px 24px 20px;
    }
    .polo-header h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
    .polo-header p { font-size: .9rem; opacity: .85; margin-top: 6px; }
    .polo-body { padding: 24px; }
    .polo-info { list-style: none; margin-bottom: 20px; }
    .polo-info li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: .95rem;
      color: var(--dark);
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .polo-info li:last-child { border-bottom: none; }
    .polo-info li .icon { font-size: 1.1rem; flex-shrink: 0; }
    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--accent);
      color: var(--white);
      font-weight: 700;
      font-size: .95rem;
      padding: 13px 20px;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s, transform .2s;
      box-shadow: 0 4px 14px rgba(37,211,102,.3);
    }
    .btn-whatsapp:hover { background: #1ebe5c; transform: translateY(-2px); }
    .btn-whatsapp svg { width: 20px; height: 20px; fill: var(--white); flex-shrink: 0; }

    /* ===== CURSOS ===== */
    #cursos { background: var(--light); }
    .cursos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 18px;
    }
    .curso-item {
      background: var(--white);
      border-radius: 10px;
      padding: 18px 16px 16px;
      border: 1px solid #e5e7eb;
      border-left: 4px solid var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: transform .15s, box-shadow .15s;
    }
    .curso-item:hover { transform: translateY(-3px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
    .curso-nome { font-weight: 700; font-size: .98rem; color: var(--dark); margin-bottom: 6px; }
    .curso-info { font-size: .85rem; color: var(--gray); display: flex; flex-direction: column; gap: 2px; }
    .curso-info span strong { color: #374151; }
    .cursos-footer { text-align: center; margin-top: 36px; }
    .cursos-footer-destaque {
      display: inline-block;
      background: var(--primary);
      color: var(--white);
      font-weight: 700;
      font-size: 1.05rem;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(249,115,22,.35);
      transition: background .2s, transform .2s;
    }
    .cursos-footer-destaque:hover { background: #ea580c; transform: translateY(-2px); }
    .cursos-footer-destaque svg { width: 20px; height: 20px; fill: var(--white); vertical-align: middle; margin-right: 8px; }

    /* ===== DEPOIMENTOS ===== */
    #depoimentos { background: var(--white); }
    #depoimentos .section-title { color: var(--dark); }

    .carrossel-wrapper {
      position: relative;
      max-width: 780px;
      margin: 0 auto;
      overflow: hidden;
    }
    .carrossel-track {
      display: flex;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
    }
    .depoimento-card {
      min-width: 100%;
      padding: 0 8px;
    }
    .depoimento-inner {
      background: var(--light);
      border-radius: 16px;
      padding: 36px 40px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }
    .depoimento-foto {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
      box-shadow: 0 4px 12px rgba(249,115,22,.25);
      background: #d1d5db;
    }
    .depoimento-estrelas { color: #f97316; font-size: 1.2rem; letter-spacing: 2px; }
    .depoimento-texto {
      font-size: 1rem;
      color: #374151;
      line-height: 1.7;
      font-style: italic;
      max-width: 580px;
    }
    .depoimento-texto::before { content: '"'; }
    .depoimento-texto::after  { content: '"'; }
    .depoimento-nome {
      font-weight: 700;
      font-size: .95rem;
      color: var(--dark);
    }
    .depoimento-detalhes {
      font-size: .82rem;
      color: var(--gray);
      margin-top: -10px;
    }

    .carrossel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(0,0,0,.15);
      transition: background .2s, transform .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .carrossel-btn:hover { background: #ea580c; transform: translateY(-50%) scale(1.08); }
    .carrossel-btn.prev { left: -20px; }
    .carrossel-btn.next { right: -20px; }
    @media(max-width: 600px){
      .carrossel-btn.prev { left: 0; }
      .carrossel-btn.next { right: 0; }
      .depoimento-inner { padding: 28px 20px; }
    }

    .carrossel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #d1d5db;
      cursor: pointer;
      transition: background .2s, transform .2s;
      border: none;
    }
    .dot.ativo { background: var(--primary); transform: scale(1.25); }

    .depoimento-cta {
      text-align: center;
      margin-top: 40px;
    }
    .btn-depoimento {
      display: inline-block;
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
      font-weight: 700;
      font-size: .95rem;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s, color .2s, transform .2s;
    }
    .btn-depoimento:hover {
      background: var(--primary);
      color: var(--white);
      transform: translateY(-2px);
    }

    /* ===== FORMULÁRIO ===== */
    #contato { background: #111111; }
    #contato .section-title { color: var(--white); }
    #contato .section-sub { color: rgba(229,231,235,0.9); }
    #contato .divider { background: var(--primary); }
    .form-wrapper {
      background: var(--white);
      border-radius: var(--radius);
      padding: 40px 36px;
      max-width: 580px;
      margin: 0 auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: .88rem;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d4d4d8;
      border-radius: 8px;
      font-size: .95rem;
      color: var(--dark);
      background: var(--light);
      transition: border-color .2s, background .2s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--white);
    }
    .form-group textarea { resize: vertical; min-height: 90px; }

    .opcoes-curso {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    @media(max-width: 480px){ .opcoes-curso { grid-template-columns: 1fr; } }
    .opcao-btn {
      padding: 14px 16px;
      border: 2px solid #d4d4d8;
      border-radius: 10px;
      background: var(--light);
      color: var(--dark);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: border-color .2s, background .2s, color .2s, transform .15s;
      font-family: inherit;
      line-height: 1.4;
    }
    .opcao-btn:hover { border-color: var(--primary); background: #fff7ed; transform: translateY(-2px); }
    .opcao-btn.ativo { border-color: var(--primary); background: var(--primary); color: var(--white); }
    .opcao-btn .opcao-icon { font-size: 1.4rem; display: block; margin-bottom: 6px; }

    #campo-curso {
      display: none;
      margin-bottom: 20px;
      animation: slideDown .25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: #111111;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background .2s, transform .2s;
      margin-top: 4px;
      box-shadow: 0 4px 18px rgba(0,0,0,.2);
    }
    .btn-submit:hover { background: #ea580c; transform: translateY(-2px); }
    .form-note { text-align: center; font-size: .8rem; color: var(--gray); margin-top: 12px; }
    .success-msg {
      display: none;
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      color: #065f46;
      font-weight: 600;
      margin-top: 20px;
    }

    /* ===== FOOTER ===== */
    footer {
      background: #18181b;
      color: rgba(229,231,235,.8);
      text-align: center;
      padding: 32px 20px;
      font-size: .88rem;
    }
    footer strong { color: var(--primary); }
    footer a { color: var(--primary); text-decoration: none; }

    /* ===== WHATSAPP FLUTUANTE ===== */
    .float-wa {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--accent);
      color: var(--white);
      border-radius: 50px;
      padding: 14px 22px;
      font-weight: 700;
      font-size: .9rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 24px rgba(37,211,102,.45);
      z-index: 999;
      transition: transform .2s, background .2s;
    }
    .float-wa:hover { transform: scale(1.06); background: #1ebe5c; }
    .float-wa svg { width: 22px; height: 22px; fill: var(--white); }
  </style>
</head>
<body>

<!-- ===== HERO ===== -->
<header>
  <img src="logo.png" alt="Unifatecie EAD" class="logo-img"/>
  <h1>Graduação e Pós-Graduação<br>em Barra do Mendes e Ipupiara</h1>
  <p>Estude no seu ritmo, com apoio dos polos autorizados Unifatecie em Barra do Mendes e Ipupiara - BA. Qualidade reconhecida e mensalidades que cabem no bolso.</p>
  <a href="#contato" class="btn-hero">Quero receber mais informações</a>
</header>
